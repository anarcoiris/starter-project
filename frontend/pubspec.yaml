name: news_app_clean_architecture
description: A new Flutter project for Symmetry (InfoVeraz).

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  ionicons: ^0.2.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  get_it: ^9.2.1
  intl: ^0.20.2
  floor: ^1.5.0
  
  # Network & API
  dio: ^5.4.1
  retrofit: ^4.9.2

  # Firebase
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # Extensions & Rendering
  flutter_hooks: ^0.21.3+1
  cached_network_image: ^3.3.0
  flutter_markdown_plus: ^1.0.7
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  path_provider: ^2.1.2
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.0
  syncfusion_flutter_pdfviewer: ^33.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  floor_generator: ^1.5.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    # WARNING: Do not include sensitive keys in .env if bundled as an asset.
    # Use --dart-define for sensitive production keys.
    - .env
    - assets/images/


    - assets/fonts/muli/

  fonts:
    - family: Muli
      fonts:
        - asset: assets/fonts/muli/Muli.ttf
        - asset: assets/fonts/muli/Muli-Bold.ttf
          weight: 700
        - asset: assets/fonts/muli/Muli-Light.ttf
          weight: 300
