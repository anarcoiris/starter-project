services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - symmetry_mongo_data:/data/db

  api:
    build: .
    ports:
      - "9000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: symmetry
    depends_on:
      - mongodb

  caddy:
    image: caddy:2-alpine
    ports:
      - "9080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  symmetry_mongo_data:
